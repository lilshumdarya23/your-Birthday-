<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phone Screen 🎮</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen-Sans, Ubuntu, Cantarell, "Helvetica Neue", sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .phone {
            width: 360px;
            height: 720px;
            border-radius: 40px;
            background: #a0d8ff;
            border: 5px solid #ccc;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding-top: 40px;
            box-sizing: border-box;
        }

        .time-date {
            color: #111;
            text-align: center;
        }

        #time {
            font-size: 50px;
            font-weight: 300;
            line-height: 1;
        }

        #dayDate {
            font-size: 20px;
            font-weight: 400;
            margin-top: 5px;
        }

        .app-grid {
            display: flex;
            justify-content: space-around;
            width: 100%;
            padding-bottom: 40px;
        }

        .app-button {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            user-select: none;
        }

        .app-button:hover {
            transform: scale(1.1);
            background: #eee;
        }

        .notification {
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #111;
            padding: 15px 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            font-weight: bold;
            text-align: center;
            font-size: 18px;
            transition: top 1s ease;
            z-index: 10;
        }
        .notification.show {
            top: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

<div class="phone">
    <div class="time-date">
        <div id="time">--:--</div>
        <div id="dayDate">---</div>
    </div>

    <div class="app-grid">
        <div class="app-button" id="photos">📸</div>
        <div class="app-button" id="notes">📝</div>
        <div class="app-button" id="music">🎵</div>
        <div class="app-button" id="maps">🗺️</div>
        <div class="app-button" id="flight">✈️</div>
    </div>

    <div class="notification" id="notification">Включите авиарежим!</div>
</div>

<script>
    function updateTime() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2,'0');
        const minutes = String(now.getMinutes()).padStart(2,'0');
        const days = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
        const dayName = days[now.getDay()];
        const dayNum = now.getDate();
        document.getElementById('time').textContent = `${hours}:${minutes}`;
        document.getElementById('dayDate').textContent = `${dayName} ${dayNum}`;
    }
    setInterval(updateTime, 1000);
    updateTime();

    const buttons = ['photos','notes','music','maps'];
    const clickedButtons = new Set();
    const notification = document.getElementById('notification');

    buttons.forEach(id => {
        document.getElementById(id).addEventListener('click', () => {
            clickedButtons.add(id);
            alert(`${id} открыт!`);
            if(clickedButtons.size === buttons.length){
                notification.classList.add('show');
            }
        });
    });

    document.getElementById('flight').addEventListener('click', () => {
        if(notification.classList.contains('show')) {
            alert("Авиарежим включен! Переходим к игре ✈️");
            window.location.href = '/three/fly'
        } else {
            alert("Сначала откройте все остальные приложения!");
        }
    });
</script>

</body>
</html>
