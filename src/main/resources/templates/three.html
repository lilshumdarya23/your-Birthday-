<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Phone Screen 🎮</title>
    <style>
        body {
            margin: 0;
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .phone {
            width: 360px;
            height: 720px;
            border-radius: 40px;
            background: #a0d8ff;
            border: 5px solid #ccc;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding-top: 40px;
            box-sizing: border-box;
        }
        .time-date { color: #111; text-align:center; }
        #time { font-size:50px; font-weight:300; line-height:1; }
        #dayDate { font-size:20px; font-weight:400; margin-top:5px; }
        .app-grid {
            display: flex;
            justify-content: space-around;
            width: 100%;
            padding-bottom: 40px;
        }
        .app-button {
            width: 60px;
            height: 60px;
            border-radius: 15px;
            background: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            user-select: none;
        }
        .app-button:hover { transform: scale(1.1); background: #eee; }
        .notification {
            position: absolute;
            top: -80px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #111;
            padding: 15px 30px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            font-weight: bold;
            text-align: center;
            font-size: 18px;
            transition: top 1s ease;
            z-index: 10;
        }
        .notification.show { top: 50%; transform: translate(-50%, -50%); }

        /* Окна приложений */
        .app-window {
            position: absolute;
            top:50px;
            left:50%;
            transform: translateX(-50%);
            width:280px;
            height:400px;
            background:#fff;
            color:#111;
            border-radius:20px;
            padding:20px;
            box-sizing:border-box;
            display:none;
            flex-direction:column;
            align-items:center;
            justify-content:flex-start;
            box-shadow:0 0 30px rgba(0,0,0,0.5);
            z-index:5;
        }
        .app-window h2 { margin-top:0; font-size:24px; text-align:center; }
        .close-btn {
            padding:10px 20px;
            border:none;
            border-radius:10px;
            background:#00c853;
            color:white;
            cursor:pointer;
            font-size:16px;
            transition:0.2s;
            margin-top:10px;
        }
        .close-btn:hover { background:#00e676; }

        /* Галерея миниатюр */
        .gallery {
            display:flex;
            flex-wrap: wrap;
            gap:10px;
            justify-content:center;
            margin-top:10px;
        }
        .gallery img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius:8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .gallery img:hover { transform: scale(1.1); }

        /* Lightbox */
        #lightbox {
            display:none;
            position:absolute;
            top:0; left:0;
            width:100%; height:100%;
            background: rgba(0,0,0,0.85);
            justify-content:center;
            align-items:center;
            z-index:20;
            flex-direction:column;
            pointer-events:auto;
        }
        #lightbox img {
            max-width:90%;
            max-height:90%;
            border-radius:10px;
            margin-bottom: 10px;
        }
        #lightbox button {
            margin:5px;
            padding:10px 20px;
            border:none;
            border-radius:10px;
            background:#00c853;
            color:white;
            cursor:pointer;
            font-size:16px;
        }
    </style>
</head>
<body>

<div class="phone">
    <div class="time-date">
        <div id="time">--:--</div>
        <div id="dayDate">---</div>
    </div>

    <div class="app-grid">
        <div class="app-button" id="photos">📸</div>
        <div class="app-button" id="notes">📝</div>
        <div class="app-button" id="music">🎵</div>
        <div class="app-button" id="maps">🗺️</div>
        <div class="app-button" id="flight">✈️</div>
    </div>

    <div class="notification" id="notification">Включите авиарежим!</div>

    <!-- Окно Фото -->
    <div class="app-window" id="photos-window">
        <h2>Фотографии 📸</h2>
        <div class="gallery">
            <img src="/photos/photo1.jpg" alt="Фото 1">
            <img src="/photos/photo2.jpg" alt="Фото 2">
        </div>
        <button class="close-btn">Закрыть</button>
    </div>

    <div class="app-window" id="notes-window">
        <h2>Заметки 📝</h2>
        <div style="width:90%; margin-top:10px; text-align:center; font-size:18px; line-height:1.5; color:#111;">
            С Днём Рожденья поздравляю,<br>
            Счастья, радости желаю!
        </div>
        <button class="close-btn">Закрыть</button>
    </div>

    <div class="app-window" id="music-window">
        <h2>Музыка 🎵</h2>

        <div style="width:90%; margin-top:10px; display:flex; flex-direction:column; gap:10px;">
            <button class="track-btn" data-src="/music/track1.mp3">Трек 1</button>
            <button class="track-btn" data-src="/music/track2.mp3">Трек 2</button>
            <button class="track-btn" data-src="/music/track3.mp3">Трек 3</button>
            <button class="track-btn" data-src="/music/track4.mp3">Трек 4</button>
        </div>

        <audio id="music-player" controls style="width:100%; max-width:260px; margin-top:15px;"></audio>

        <button class="close-btn">Закрыть</button>
    </div>

    <!-- Lightbox -->
    <div id="lightbox">
        <img id="lightbox-img" src="">
        <div>
            <button id="prev">← Пред.</button>
            <button id="next">След. →</button>
            <button id="close-lightbox">Закрыть</button>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // Время и дата
        function updateTime() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2,'0');
            const minutes = String(now.getMinutes()).padStart(2,'0');
            const days = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
            const dayName = days[now.getDay()];
            const dayNum = now.getDate();
            document.getElementById('time').textContent = `${hours}:${minutes}`;
            document.getElementById('dayDate').textContent = `${dayName} ${dayNum}`;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // Окна приложений
        const apps = ['photos','notes','music','maps'];
        const clickedButtons = new Set();
        const notification = document.getElementById('notification');

        apps.forEach(id => {
            const windowId = `${id}-window`;
            const appBtn = document.getElementById(id);
            const appWindow = document.getElementById(windowId);
            if(appWindow) {
                appBtn.addEventListener('click', () => {
                    appWindow.style.display = 'flex';
                    clickedButtons.add(id);
                    if(clickedButtons.size === apps.length){
                        notification.classList.add('show');
                    }
                });
                const closeBtn = appWindow.querySelector('.close-btn');
                if(closeBtn) closeBtn.addEventListener('click', () => { appWindow.style.display='none'; });
            }
        });

        const musicWindow = document.getElementById('music-window');
        const musicPlayer = document.getElementById('music-player');
        const trackButtons = musicWindow.querySelectorAll('.track-btn');

        trackButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const src = btn.dataset.src;  // путь к треку
                musicPlayer.src = src;        // меняем источник
                musicPlayer.play().catch(err => console.log("Автоплей заблокирован", err));
            });
        });

        // Полёт к игре
        document.getElementById('flight').addEventListener('click', () => {
            if(notification.classList.contains('show')) {
                alert("Авиарежим включен! Переходим к игре ✈️");
                window.location.href = '/three/fly';
            } else {
                alert("Сначала откройте все остальные приложения!");
            }
        });

        // Lightbox
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const images = Array.from(document.querySelectorAll('#photos-window .gallery img'));
        let currentIndex = 0;

        images.forEach((img, idx) => {
            img.addEventListener('click', () => {
                currentIndex = idx;
                lightboxImg.src = img.src;
                lightbox.style.display = 'flex';
            });
        });

        document.getElementById('prev').addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + images.length) % images.length;
            lightboxImg.src = images[currentIndex].src;
        });
        document.getElementById('next').addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % images.length;
            lightboxImg.src = images[currentIndex].src;
        });
        document.getElementById('close-lightbox').addEventListener('click', () => {
            lightbox.style.display = 'none';
        });
    });
</script>
</body>
</html>
